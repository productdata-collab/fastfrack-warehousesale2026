<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบของฉัน</title>
  <style>
    /* ตั้งค่าไม่ให้มีขอบ และไม่ให้หน้าจอเลื่อนซ้อนกัน */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; 
    }
    /* เทคนิคดันหน้าจอขึ้นไปซ่อนแถบสีฟ้า */
    .iframe-container {
      position: absolute;
      top: -45px; /* ถ้าแถบสียังโผล่มานิดนึง ให้เปลี่ยนเป็น -50px หรือ -55px */
      left: 0;
      width: 100%;
      height: calc(100% + 45px); /* ขยายจอชดเชยส่วนที่โดนดันขึ้นไป */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <iframe src="https://script.google.com/a/macros/lifestylefurniture.co.th/s/AKfycbwChMXEBzc2XMeoMtPdh7_dLWFbxooGtMicKoGbRshzhCcMjykn7EvRi2lXsIzjx_lO/exec?page=customer"></iframe>
  </div>

</body>
</html>
